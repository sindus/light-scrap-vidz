name: light-scrap-vidz
base: core24
version: '0.1.0'
summary: Download TikTok, Instagram, YouTube and Facebook videos as MP4
icon: src-tauri/icons/128x128.png
description: |
  light-scrap-vidZ is a desktop app to download videos from TikTok, Instagram,
  YouTube, Facebook — and any other platform supported by yt-dlp — directly as
  MP4 or MP3.

  Features:
  - Single video or full playlist/profile download
  - Audio-only extraction (MP3)
  - Browser cookie auth for Instagram and private content (Firefox, Chrome, Chromium)
  - Download queue for batch downloads
  - System notifications on completion
  - Quality selector (best, 1080p, 720p, 480p)

  yt-dlp is bundled — no extra installation needed.

grade: stable
confinement: strict

apps:
  light-scrap-vidz:
    command: usr/bin/light-scrap-vidz
    extensions: [gnome]
    desktop: usr/share/applications/light-scrap-vidz.desktop
    environment:
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
      WEBKIT_EXEC_PATH: "$SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1"
      YTDLP_PATH: "$SNAP/usr/bin/yt-dlp"
    plugs:
      - home
      - network
      - removable-media

parts:
  light-scrap-vidz:
    plugin: nil
    source: .
    build-snaps:
      - node/20/stable
      - rustup/latest/stable
    build-packages:
      - pkg-config
      - curl
      - libssl-dev
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
    stage-packages:
      - libayatana-appindicator3-1
      - librsvg2-2
    override-build: |
      rustup default stable
      npm ci
      npm run build
      cargo build --release --features custom-protocol -p light-scrap-vidz
      install -Dm755 target/release/light-scrap-vidz \
        "$CRAFT_PART_INSTALL/usr/bin/light-scrap-vidz"
      curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp" \
        -o "$CRAFT_PART_INSTALL/usr/bin/yt-dlp"
      chmod +x "$CRAFT_PART_INSTALL/usr/bin/yt-dlp"
      install -Dm644 src-tauri/icons/128x128.png \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/light-scrap-vidz.png"
      mkdir -p "$CRAFT_PART_INSTALL/usr/share/applications"
      printf '[Desktop Entry]\nName=light-scrap-vidZ\nComment=Download videos as MP4 or MP3\nExec=light-scrap-vidz\nIcon=light-scrap-vidz\nType=Application\nCategories=Network;FileTransfer;\n' \
        > "$CRAFT_PART_INSTALL/usr/share/applications/light-scrap-vidz.desktop"
